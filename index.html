<html lang="en">
<head>
<meta charset="UTF-8">

    });

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; padding: 0 0 60px; }

/* ── NAV TABS ── */
.nav { display: flex; background: #1e293b; border-bottom: 1px solid #334155; }
.nav-btn { flex: 1; padding: 14px 0; text-align: center; font-size: 13px; font-weight: 600; color: #64748b; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
.nav-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }

/* ── PAGES ── */
.page { display: none; padding: 24px 16px; }
.page.active { display: block; }

/* ── HEADER ── */
.header { text-align: center; margin-bottom: 24px; position: relative; }
.header h1 { font-size: 22px; font-weight: 700; color: #fff; }
.header p { font-size: 13px; color: #64748b; margin-top: 5px; }
.admin-btn { position: absolute; top: 0; right: 0; background: none; border: 1px solid #334155; color: #475569; font-size: 11px; padding: 5px 10px; border-radius: 8px; cursor: pointer; }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 6px; }
.search-wrap input { width: 100%; padding: 15px 44px 15px 16px; font-size: 17px; border-radius: 14px; border: 2px solid #334155; background: #1e293b; color: #f1f5f9; outline: none; -webkit-appearance: none; }
.search-wrap input:focus { border-color: #3b82f6; }
.clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; padding: 4px; display: none; }
.hints { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 12px; justify-content: center; }
.hint { padding: 5px 13px; border-radius: 20px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; font-size: 13px; cursor: pointer; }
.hint:active { background: #334155; }
#results { margin-top: 18px; }
.result-count { font-size: 12px; color: #64748b; margin-bottom: 8px; }
.card { display: flex; align-items: center; gap: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 13px 14px; margin-bottom: 8px; cursor: pointer; }
.card.dup { background: #2d1a1a; border-color: #7f1d1d; }
.card:active { opacity: 0.75; }
.badge { background: #1d4ed8; color: #fff; border-radius: 8px; padding: 4px 9px; font-size: 12px; font-weight: 700; white-space: nowrap; min-width: 48px; text-align: center; flex-shrink: 0; }
.card.dup .badge { background: #7f1d1d; }
.card-name { font-size: 15px; color: #f1f5f9; font-weight: 500; flex: 1; }
.dup-label { font-size: 11px; color: #f87171; margin-top: 2px; }
.copy-icon { font-size: 17px; color: #475569; flex-shrink: 0; }
.empty { text-align: center; padding: 36px 0; color: #64748b; font-size: 15px; background: #1e293b; border-radius: 14px; border: 1px solid #334155; }
.empty .emoji { font-size: 30px; margin-bottom: 8px; }

/* ── ANNOUNCEMENTS ── */
.ann-card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.ann-card .ann-title { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
.ann-card .ann-body { font-size: 14px; color: #94a3b8; line-height: 1.6; }
.ann-card .ann-date { font-size: 11px; color: #475569; margin-top: 8px; }
.ann-empty { text-align: center; padding: 60px 0; color: #64748b; font-size: 15px; }
.ann-empty .emoji { font-size: 40px; margin-bottom: 12px; }
.notif-banner { background: #1e3a5f; border: 1px solid #2563eb; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #93c5fd; display: flex; align-items: center; gap: 10px; }
.notif-banner button { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.2s; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; }

/* ── NOTIFICATION BADGE ── */
.nav-badge { background: #ef4444; color: #fff; border-radius: 10px; font-size: 10px; padding: 1px 5px; margin-left: 4px; display: inline-block; }

/* ── OVERLAY / ADMIN ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; overflow-y: auto; padding: 20px 16px 40px; }
.overlay.show { display: block; }
.panel { background: #1e293b; border-radius: 16px; max-width: 480px; margin: 0 auto; padding: 24px 20px; }
.panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.panel-header h2 { font-size: 18px; font-weight: 700; }
.close-btn { background: none; border: none; color: #64748b; font-size: 24px; cursor: pointer; }
#pwPanel { display: block; }
#adminPanel { display: none; }
.pw-wrap { margin-bottom: 14px; }
.pw-wrap input { width: 100%; padding: 13px 14px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 16px; outline: none; }
.pw-wrap input:focus { border-color: #3b82f6; }
.pw-err { color: #f87171; font-size: 13px; margin-top: 6px; display: none; }
.tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
.tab { flex: 1; padding: 9px 0; text-align: center; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: #0f172a; color: #64748b; min-width: 60px; }
.tab.active { background: #1d4ed8; color: #fff; }
.form-group { margin-bottom: 12px; }
.form-group label { font-size: 12px; color: #64748b; margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: 0.4px; }
.form-group input, .form-group textarea { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 15px; outline: none; font-family: inherit; }
.form-group textarea { min-height: 80px; resize: vertical; }
.form-group input:focus, .form-group textarea:focus { border-color: #3b82f6; }
.btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
.btn-green { background: #16a34a; color: #fff; }
.btn-blue { background: #2563eb; color: #fff; }
.btn-red { background: #dc2626; color: #fff; }
.adm-msg { padding: 9px 12px; border-radius: 8px; font-size: 13px; margin-top: 10px; display: none; }
.adm-msg.ok { background: #14532d; color: #86efac; display: block; }
.adm-msg.err { background: #7f1d1d; color: #fca5a5; display: block; }
.search-results { max-height: 200px; overflow-y: auto; margin-top: 10px; }
.srow { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #334155; }
.sbadge { background: #1d4ed8; color: #fff; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; flex-shrink: 0; min-width: 44px; text-align: center; }
.sname { flex: 1; font-size: 13px; color: #cbd5e1; }
.sel-label { font-size: 11px; color: #3b82f6; cursor: pointer; }
.selected-banner { background: #1e3a5f; border: 1px solid #2563eb; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 13px; color: #93c5fd; display: none; }
.sync-status { font-size: 11px; color: #64748b; text-align: center; margin-bottom: 12px; }
.sync-status.synced { color: #22c55e; }
.sync-status.syncing { color: #f59e0b; }
</style>
</head>
<body>

<!-- Nav -->
<div class="nav">
  <button class="nav-btn active" id="nav-search" data-page="search">&#128269; Search</button>
  <button class="nav-btn" id="nav-announce" data-page="announce">&#128227; Announcements<span class="nav-badge" id="newBadge" style="display:none">!</span></button>
</div>

<!-- Search Page -->
<div class="page active" id="page-search">
  <div class="header">
    <h1>Member Lookup</h1>
    <p id="count-label">Loading...</p>
    <button class="admin-btn" onclick="openAdmin()">&#9881; Admin</button>
  </div>
  <div class="search-wrap">
    <input type="search" id="searchInput" placeholder="B255, RH142, Moshe..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">&#x2715;</button>
  </div>
  <div class="hints" id="hints">
    <button class="hint" onclick="setQuery('B255')">B255</button>
    <button class="hint" onclick="setQuery('RH142')">RH142</button>
    <button class="hint" onclick="setQuery('KY71')">KY71</button>
    <button class="hint" onclick="setQuery('Moshe')">Moshe</button>
    <button class="hint" onclick="setQuery('Goldberger')">Goldberger</button>
  </div>
  <div id="results"></div>
</div>

<!-- Announcements Page -->
<div class="page" id="page-announce">
  <div class="header">
    <h1>&#128227; Announcements</h1>
    <p>Latest news from KJ Members</p>
  </div>
  <div id="notifBanner" class="notif-banner" style="display:none">
    <span>&#128276; Get notified of new announcements!</span>
    <button onclick="enableNotifications()">Enable</button>
  </div>
  <div id="annList"><div class="ann-empty"><div class="emoji">&#128227;</div>No announcements yet</div></div>
</div>

<div class="toast" id="toast">Copied!</div>

<!-- Admin Overlay -->
<div class="overlay" id="overlay">
  <div class="panel">
    <div class="panel-header">
      <h2>&#9881; Admin</h2>
      <button class="close-btn" onclick="closeAdmin()">&#x2715;</button>
    </div>
    <div id="pwPanel">
      <div class="pw-wrap">
        <input type="password" id="pwInput" placeholder="Enter password..." onkeydown="if(event.key==='Enter')checkPw()">
        <div class="pw-err" id="pwErr">Incorrect password.</div>
      </div>
      <button class="btn btn-blue" onclick="checkPw()">Unlock Admin</button>
    </div>
    <div id="adminPanel">
      <div class="sync-status synced" id="syncStatus">&#10003; Connected</div>
      <div class="tabs">
        <button class="tab active" id="tab-add" onclick="switchTab('add')">&#43; Add</button>
        <button class="tab" id="tab-edit" onclick="switchTab('edit')">&#9998; Edit</button>
        <button class="tab" id="tab-del" onclick="switchTab('del')">&#128465; Delete</button>
        <button class="tab" id="tab-ann" onclick="switchTab('ann')">&#128227; Post</button>
      </div>

      <!-- ADD -->
      <div id="pane-add">
        <div class="form-group"><label>Unit ID</label><input type="text" id="addId" placeholder="e.g. KY424" autocorrect="off" autocapitalize="characters" spellcheck="false"></div>
        <div class="form-group"><label>Full Name</label><input type="text" id="addName" placeholder="e.g. Berry Fisher"></div>
        <button class="btn btn-green" onclick="doAdd()">Add Member</button>
        <div class="adm-msg" id="addMsg"></div>
      </div>

      <!-- EDIT -->
      <div id="pane-edit" style="display:none">
        <div class="form-group"><input type="text" id="editSearch" placeholder="Search member..." oninput="searchForEdit()" autocorrect="off" spellcheck="false"></div>
        <div class="search-results" id="editList"></div>
        <div class="selected-banner" id="editBanner"></div>
        <div id="editFields" style="display:none">
          <div class="form-group"><label>Unit ID</label><input type="text" id="editId" autocorrect="off" autocapitalize="characters" spellcheck="false"></div>
          <div class="form-group"><label>Full Name</label><input type="text" id="editName"></div>
          <button class="btn btn-blue" onclick="doEdit()">Save Changes</button>
        </div>
        <div class="adm-msg" id="editMsg"></div>
      </div>

      <!-- DELETE -->
      <div id="pane-del" style="display:none">
        <div class="form-group"><input type="text" id="delSearch" placeholder="Search member to delete..." oninput="searchForDel()" autocorrect="off" spellcheck="false"></div>
        <div class="search-results" id="delList"></div>
        <div class="adm-msg" id="delMsg"></div>
      </div>

      <!-- ANNOUNCE -->
      <div id="pane-ann" style="display:none">
        <div class="form-group"><label>Title</label><input type="text" id="annTitle" placeholder="e.g. Mazel Tov!"></div>
        <div class="form-group"><label>Message</label><textarea id="annBody" placeholder="Write your announcement here..."></textarea></div>
        <button class="btn btn-green" onclick="doAnnounce()">&#128227; Post & Notify Everyone</button>
        <div class="adm-msg" id="annMsg"></div>
        <div style="margin-top:20px;border-top:1px solid #334155;padding-top:16px;">
          <div style="font-size:12px;color:#64748b;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.4px;">Existing Announcements</div>
          <div id="adminAnnList"></div>
        </div>
      </div>
    </div>
  </div>
</div>


<script>
// Nav switching (non-module so it works from HTML)
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll(".nav-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var name = this.getAttribute("data-page");
      document.querySelectorAll(".page").forEach(function(p){ p.classList.remove("active"); });
      document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
      document.getElementById("page-"+name).classList.add("active");
      document.getElementById("nav-"+name).classList.add("active");
      if(name === "announce") {
        document.getElementById("newBadge").style.display = "none";
        localStorage.setItem("lastSeenAnn", "seen");
      }
    });
  });
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwKHUQq0MH7WhMootK7N2XFOMdoTBF-qY",
  authDomain: "member-lookup-82e42.firebaseapp.com",
  projectId: "member-lookup-82e42",
  storageBucket: "member-lookup-82e42.firebasestorage.app",
  messagingSenderId: "802214275542",
  appId: "1:802214275542:web:06ccd1152d6ef194e71c77"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var MEMBERS = [];
var DOCS = {};
var lastSeenAnn = localStorage.getItem("lastSeenAnn") || "";

function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function setSyncStatus(msg, cls) { var el = document.getElementById("syncStatus"); if(el){el.textContent=msg;el.className="sync-status "+(cls||"");} }

// ── LIVE MEMBERS ──
onSnapshot(collection(db, "members"), function(snap) {
  MEMBERS = []; DOCS = {};
  snap.forEach(function(d) {
    var m = d.data();
    MEMBERS.push({id: m.id, name: m.name, docId: d.id});
    DOCS[d.id] = m;
  });
  MEMBERS.sort(function(a,b) {
    var am = a.id.match(/^([A-Za-z]+)(\d+)/), bm = b.id.match(/^([A-Za-z]+)(\d+)/);
    if(am&&bm){ if(am[1].toUpperCase()!==bm[1].toUpperCase()) return am[1]<bm[1]?-1:1; return parseInt(am[2])-parseInt(bm[2]); }
    return a.id<b.id?-1:1;
  });
  document.getElementById("count-label").textContent = MEMBERS.length + " members";
  setSyncStatus("&#10003; Live — " + MEMBERS.length + " members", "synced");
  if(window._lastQuery) renderSearch(window._lastQuery);
});

// ── LIVE ANNOUNCEMENTS ──
var annQuery = query(collection(db, "announcements"), orderBy("createdAt", "desc"));
onSnapshot(annQuery, function(snap) {
  var anns = [];
  snap.forEach(function(d) { anns.push({...d.data(), docId: d.id}); });
  renderAnnouncements(anns);
  renderAdminAnns(anns);
  // Check for new ones
  if(anns.length > 0) {
    var latest = anns[0].docId;
    if(lastSeenAnn !== latest && document.getElementById("page-announce").classList.contains("active") === false) {
      document.getElementById("newBadge").style.display = "inline-block";
    }
  }
});

function renderAnnouncements(anns) {
  var el = document.getElementById("annList");
  if(!anns.length) { el.innerHTML = "<div class='ann-empty'><div class='emoji'>&#128227;</div>No announcements yet</div>"; return; }
  var html = "";
  for(var a of anns) {
    var date = a.createdAt ? new Date(a.createdAt.seconds*1000).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "";
    html += "<div class='ann-card'>";
    html += "<div class='ann-title'>" + escHtml(a.title) + "</div>";
    html += "<div class='ann-body'>" + escHtml(a.body) + "</div>";
    html += "<div class='ann-date'>" + date + "</div>";
    html += "</div>";
  }
  el.innerHTML = html;
}

function renderAdminAnns(anns) {
  var el = document.getElementById("adminAnnList");
  if(!anns.length) { el.innerHTML = "<div style='color:#64748b;font-size:13px'>No announcements yet</div>"; return; }
  var html = "";
  for(var a of anns) {
    html += "<div style='display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #334155'>";
    html += "<div style='flex:1;font-size:13px;color:#cbd5e1'>" + escHtml(a.title) + "</div>";
    html += "<button onclick='deleteAnn(\"" + a.docId + "\")' style='background:#dc2626;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer'>Del</button>";
    html += "</div>";
  }
  el.innerHTML = html;
}

// ── NOTIFICATIONS ──
window.enableNotifications = async function() {
  try {
    await OneSignalDeferred.push(function(OneSignal) { OneSignal.Notifications.requestPermission(); });
    document.getElementById("notifBanner").style.display = "none";
    localStorage.setItem("notifAsked", "1");
  } catch(e) { console.log(e); }
};

// Show notification prompt if not asked yet
setTimeout(function() {
  if(!localStorage.getItem("notifAsked")) {
    document.getElementById("notifBanner").style.display = "flex";
  }
}, 2000);



// ── SEARCH ──
var input = document.getElementById("searchInput");
var clearBtn = document.getElementById("clearBtn");
var hintsEl = document.getElementById("hints");
var resultsEl = document.getElementById("results");

input.addEventListener("input", function() {
  var q = input.value;
  window._lastQuery = q.trim();
  clearBtn.style.display = q ? "block" : "none";
  hintsEl.style.display = q ? "none" : "flex";
  renderSearch(q.trim());
});

window.setQuery = function(v) { input.value = v; window._lastQuery = v; clearBtn.style.display="block"; hintsEl.style.display="none"; renderSearch(v); };
window.clearSearch = function() { input.value=""; window._lastQuery=""; clearBtn.style.display="none"; hintsEl.style.display="flex"; resultsEl.innerHTML=""; };

function renderSearch(q) {
  if(!q||q.length<2){resultsEl.innerHTML="";return;}
  var uq=q.toUpperCase(), byId=[], byName=[];
  for(var i=0;i<MEMBERS.length;i++){
    if(MEMBERS[i].id.toUpperCase().indexOf(uq)!==-1) byId.push(i);
    else if(MEMBERS[i].name.toUpperCase().indexOf(uq)!==-1) byName.push(i);
  }
  var idxs=byId.concat(byName).slice(0,25);
  if(!idxs.length){resultsEl.innerHTML="<div class='empty'><div class='emoji'>&#x1F615;</div>No results for <strong>"+escHtml(q)+"</strong></div>";return;}
  var seen={},dupeIds={};
  for(var i=0;i<idxs.length;i++){var id=MEMBERS[idxs[i]].id;if(seen[id])dupeIds[id]=true;else seen[id]=true;}
  var html="<div class='result-count'>"+idxs.length+" result"+(idxs.length>1?"s":"")+"</div>";
  window._lastIdxs=idxs;
  for(var i=0;i<idxs.length;i++){
    var m=MEMBERS[idxs[i]],isDup=!!dupeIds[m.id];
    html+="<div class='card"+(isDup?" dup":"")+"' onclick='copyEntry("+i+")'>";
    html+="<div class='badge'>"+escHtml(m.id)+"</div>";
    html+="<div style='flex:1'><div class='card-name'>"+escHtml(m.name)+"</div>"+(isDup?"<div class='dup-label'>&#x26A0; Duplicate ID</div>":"")+"</div>";
    html+="<div class='copy-icon'>&#x1F4CB;</div></div>";
  }
  resultsEl.innerHTML=html;
}

window.copyEntry = function(i) {
  var m=MEMBERS[window._lastIdxs[i]], text=m.id+"  "+m.name;
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(showToast).catch(function(){fbCopy(text);});}else{fbCopy(text);}
};
function fbCopy(text){var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");showToast();}catch(e){}document.body.removeChild(ta);}
function showToast(){var t=document.getElementById("toast");t.classList.add("show");setTimeout(function(){t.classList.remove("show");},1500);}

// ── ADMIN ──
window.openAdmin = function(){document.getElementById("overlay").classList.add("show");document.body.style.overflow="hidden";};
window.closeAdmin = function(){document.getElementById("overlay").classList.remove("show");document.body.style.overflow="";};

window.checkPw = function(){
  if(document.getElementById("pwInput").value==="Aa12483988"){
    document.getElementById("pwPanel").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    document.getElementById("pwErr").style.display="none";
  } else {
    document.getElementById("pwErr").style.display="block";
    document.getElementById("pwInput").value="";
  }
};

window.switchTab = function(name){
  ["add","edit","del","ann"].forEach(function(t){
    document.getElementById("tab-"+t).className="tab"+(t===name?" active":"");
    document.getElementById("pane-"+t).style.display=t===name?"block":"none";
  });
};

function admMsg(id,text,isErr){var el=document.getElementById(id);el.textContent=text;el.className="adm-msg "+(isErr?"err":"ok");setTimeout(function(){el.className="adm-msg";},3000);}

// ADD
window.doAdd = async function(){
  var id=document.getElementById("addId").value.trim().toUpperCase();
  var name=document.getElementById("addName").value.trim();
  if(!id||!name) return admMsg("addMsg","Please fill in both fields.",true);
  try{
    setSyncStatus("Saving...","syncing");
    await addDoc(collection(db,"members"),{id:id,name:name});
    document.getElementById("addId").value="";
    document.getElementById("addName").value="";
    admMsg("addMsg","Added: "+id+"  "+name,false);
  }catch(e){admMsg("addMsg","Error: "+e.message,true);}
};

// EDIT
var editDocId=null;
window.searchForEdit = function(){
  var q=document.getElementById("editSearch").value.trim().toUpperCase();
  var el=document.getElementById("editList");
  document.getElementById("editFields").style.display="none";
  document.getElementById("editBanner").style.display="none";
  editDocId=null;
  if(q.length<2){el.innerHTML="";return;}
  var hits=[];
  for(var i=0;i<MEMBERS.length;i++){
    if(MEMBERS[i].id.toUpperCase().indexOf(q)!==-1||MEMBERS[i].name.toUpperCase().indexOf(q)!==-1) hits.push(i);
    if(hits.length>=8) break;
  }
  if(!hits.length){el.innerHTML="<div style='color:#64748b;font-size:13px;padding:6px 0'>No results</div>";return;}
  var html="";
  for(var j=0;j<hits.length;j++){
    var m=MEMBERS[hits[j]];
    html+="<div class='srow' onclick='selectEdit("+j+")'><div class='sbadge'>"+escHtml(m.id)+"</div><div class='sname'>"+escHtml(m.name)+"</div><div class='sel-label'>Select</div></div>";
  }
  el.innerHTML=html;
  window._editHits=hits;
};

window.selectEdit = function(j){
  var m=MEMBERS[window._editHits[j]];
  editDocId=m.docId;
  document.getElementById("editId").value=m.id;
  document.getElementById("editName").value=m.name;
  var b=document.getElementById("editBanner");
  b.textContent="Editing: "+m.id+"  "+m.name;
  b.style.display="block";
  document.getElementById("editFields").style.display="block";
  document.getElementById("editList").innerHTML="";
  document.getElementById("editSearch").value="";
};

window.doEdit = async function(){
  if(!editDocId) return;
  var newId=document.getElementById("editId").value.trim().toUpperCase();
  var newName=document.getElementById("editName").value.trim();
  if(!newId||!newName) return admMsg("editMsg","ID and name cannot be empty.",true);
  try{
    setSyncStatus("Saving...","syncing");
    await updateDoc(doc(db,"members",editDocId),{id:newId,name:newName});
    document.getElementById("editFields").style.display="none";
    document.getElementById("editBanner").style.display="none";
    editDocId=null;
    admMsg("editMsg","Updated: "+newId+"  "+newName,false);
  }catch(e){admMsg("editMsg","Error: "+e.message,true);}
};

// DELETE member
window.searchForDel = function(){
  var q=document.getElementById("delSearch").value.trim().toUpperCase();
  var el=document.getElementById("delList");
  if(q.length<2){el.innerHTML="";return;}
  var hits=[];
  for(var i=0;i<MEMBERS.length;i++){
    if(MEMBERS[i].id.toUpperCase().indexOf(q)!==-1||MEMBERS[i].name.toUpperCase().indexOf(q)!==-1) hits.push(i);
    if(hits.length>=8) break;
  }
  if(!hits.length){el.innerHTML="<div style='color:#64748b;font-size:13px;padding:6px 0'>No results</div>";return;}
  var html="";
  for(var j=0;j<hits.length;j++){
    var m=MEMBERS[hits[j]];
    html+="<div class='srow'><div class='sbadge'>"+escHtml(m.id)+"</div><div class='sname'>"+escHtml(m.name)+"</div>";
    html+="<button onclick='doDelete(\""+m.docId+"\",\""+escHtml(m.id)+"\",\""+escHtml(m.name)+"\")' style='background:#dc2626;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer'>Del</button></div>";
  }
  el.innerHTML=html;
};

window.doDelete = async function(docId,id,name){
  if(!confirm("Delete "+id+"  "+name+"?")) return;
  try{
    setSyncStatus("Deleting...","syncing");
    await deleteDoc(doc(db,"members",docId));
    document.getElementById("delSearch").value="";
    document.getElementById("delList").innerHTML="";
    admMsg("delMsg","Deleted: "+id+"  "+name,false);
  }catch(e){admMsg("delMsg","Error: "+e.message,true);}
};
